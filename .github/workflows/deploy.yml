name: Deploy to Netlify

on:
  push:
      branches:
            - main
                  - develop
                    pull_request:
                        branches:
                              - main
                                    - develop

                                    jobs:
                                      build-and-deploy:
                                          runs-on: ubuntu-latest

                                              strategy:
                                                    matrix:
                                                            node-version: [20.x]

                                                                steps:
                                                                      - name: Checkout code
                                                                              uses: actions/checkout@v4

                                                                                    - name: Setup Node.js ${{ matrix.node-version }}
                                                                                            uses: actions/setup-node@v4
                                                                                                    with:
                                                                                                              node-version: ${{ matrix.node-version }}
                                                                                                                        cache: 'npm'
                                                                                                                        
                                                                                                                              - name: Install dependencies
                                                                                                                                      run: npm ci
                                                                                                                                      
                                                                                                                                            - name: Run linter
                                                                                                                                                    run: npm run lint || true
                                                                                                                                                    
                                                                                                                                                          - name: Build
                                                                                                                                                                  run: npm run build
                                                                                                                                                                          env:
                                                                                                                                                                                    PUBLIC_API_BASE_URL: ${{ vars.PUBLIC_API_BASE_URL }}
                                                                                                                                                                                              PUBLIC_S3_BUCKET_URL: ${{ vars.PUBLIC_S3_BUCKET_URL }}
                                                                                                                                                                                              
                                                                                                                                                                                                    - name: Deploy to Netlify
                                                                                                                                                                                                            if: github.ref == 'refs/heads/main'
                                                                                                                                                                                                                    uses: nwtgck/actions-netlify@v2.0
                                                                                                                                                                                                                            with:
                                                                                                                                                                                                                                      publish-dir: './build'
                                                                                                                                                                                                                                                production-branch: main
                                                                                                                                                                                                                                                          github-token: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                    deploy-message: "Deploy from GitHub Actions - ${{ github.event.head_commit.message }}"
                                                                                                                                                                                                                                                                            env:
                                                                                                                                                                                                                                                                                      NETLIFY_AUTH_TOKEN: ${{ vars.NETLIFY_AUTH_TOKEN }}
                                                                                                                                                                                                                                                                                                NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID }}
                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                      - name: Comment PR with deployment info
                                                                                                                                                                                                                                                                                                              if: github.event_name == 'pull_request'
                                                                                                                                                                                                                                                                                                                      uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                              with:
                                                                                                                                                                                                                                                                                                                                        script: |
                                                                                                                                                                                                                                                                                                                                                    github.rest.issues.createComment({
                                                                                                                                                                                                                                                                                                                                                                  issue_number: context.issue.number,
                                                                                                                                                                                                                                                                                                                                                                                owner: context.repo.owner,
                                                                                                                                                                                                                                                                                                                                                                                              repo: context.repo.repo,
                                                                                                                                                                                                                                                                                                                                                                                                            body: '✅ Build completed successfully. A preview deployment will be available shortly on Netlify.'
                                                                                                                                                                                                                                                                                                                                                                                                                        })
